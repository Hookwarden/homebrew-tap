name: Formula audit
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  audit:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - name: Tap + audit
        run: |
          # NOTE: --strict is intentionally omitted. The formula carries an
          # explicit `version "X.Y.Z"` line because brew's URL-version auto-
          # derive picks "64" from the on_linux/on_arm/on_intel binary URLs
          # (hookwarden-linux-arm64 / hookwarden-linux-x64) on Linux runners
          # — DIST-02 Homebrew smoke (in Hookwarden/hookwarden) trips without
          # the explicit version. On macOS the top-level npm-tarball URL
          # auto-derives correctly, so --strict flags the explicit version as
          # "redundant with version scanned from URL". Those two constraints
          # are contradictory for this formula shape; the explicit version
          # wins because DIST-02 enforces real install behavior, while
          # --strict's redundancy check is purely stylistic. All other audit
          # checks remain active without --strict.
          brew tap Hookwarden/tap "$(pwd)"
          brew audit --formula hookwarden
