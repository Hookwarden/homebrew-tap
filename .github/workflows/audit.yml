name: Formula audit
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  audit:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - name: Tap + audit
        run: |
          brew tap Hookwarden/tap "$(pwd)"
          brew audit --strict --formula hookwarden
